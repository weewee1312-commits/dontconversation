name: notice-check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libs
        run: pip install requests beautifulsoup4

      - name: Run script
        run: python check.py
